<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业余乒乓球人的MBTI风格测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            padding-top: 60px;
            background-color: #fff8f5;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 40px,
                    rgba(196, 30, 58, 0.03) 40px,
                    rgba(196, 30, 58, 0.03) 42px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 40px,
                    rgba(196, 30, 58, 0.03) 40px,
                    rgba(196, 30, 58, 0.03) 42px
                );
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 15px 50px rgba(196, 30, 58, 0.12);
        }
        .logo { 
            text-align: center; 
            font-size: 64px; 
            margin-bottom: 20px; 
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        h1 { 
            text-align: center; 
            color: #c41e3a; 
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px; 
            line-height: 1.4;
        }
        .subtitle { 
            text-align: center; 
            color: #666; 
            font-size: 15px; 
            line-height: 1.6; 
            margin-bottom: 35px; 
            padding: 0 10px;
        }
        .level-card { 
            border: 2px solid #e5e5e5; 
            border-radius: 16px; 
            padding: 24px; 
            margin-bottom: 16px; 
            cursor: pointer; 
            transition: all 0.35s ease; 
            background: #fff;
            position: relative;
            overflow: hidden;
        }
        .level-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #c41e3a, #ff6b35);
            transform: scaleY(0);
            transition: transform 0.35s ease;
        }
        .level-card:hover { 
            border-color: #ff6b35; 
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.18);
        }
        .level-card:hover::before {
            transform: scaleY(1);
        }
        .level-card.selected { 
            border-color: #c41e3a; 
            background: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.15);
        }
        .level-card.selected::before {
            transform: scaleY(1);
        }
        .level-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .level-icon {
            font-size: 20px;
        }
        .level-badge {
            font-size: 15px;
            padding: 4px 12px;
            background: linear-gradient(135deg, #c41e3a, #ff6b35);
            color: #fff;
            border-radius: 20px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .level-title { 
            font-size: 17px; 
            font-weight: bold; 
            color: #333; 
            margin-bottom: 4px; 
        }
        .level-desc { font-size: 14px; color: #666; line-height: 1.5; }
        .btn { 
            width: 100%; 
            height: 56px;
            background: linear-gradient(135deg, #c41e3a 0%, #ff6b35 100%); 
            color: white; 
            border: none; 
            border-radius: 16px; 
            font-size: 19px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 30px;
            box-shadow: 0 6px 20px rgba(196, 30, 58, 0.45);
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(196, 30, 58, 0.55);
        }
        .btn:hover:not(:disabled)::before {
            left: 100%;
        }
        .btn:active:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(196, 30, 58, 0.35);
        }
        .btn:disabled { 
            background: #e0e0e0; 
            cursor: not-allowed; 
            box-shadow: none;
        }
        .btn:disabled::before {
            display: none;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 30px;
            line-height: 1.6;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 18px 36px;
            border-radius: 16px;
            font-size: 16px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏓</div>
        <h1>业余乒乓球人的<br/>MBTI风格测试</h1>
        <p class="subtitle">5分钟，36道选择题，判断你的打球性格，给你专属涨球妙计</p>
        
        <div class="level-card" data-level="low">
            <div class="level-header">
                <span class="level-icon">🌱</span>
                <span class="level-badge">1200-1499</span>
            </div>
            <div class="level-title">业余初学的爱好者</div>
            <div class="level-desc">刚刚接触乒乓球，正在学习基础动作，享受运动的乐趣</div>
        </div>
        
        <div class="level-card" data-level="mid">
            <div class="level-header">
                <span class="level-icon">⭐</span>
                <span class="level-badge">1500-1799</span>
            </div>
            <div class="level-title">一定水平的进阶者</div>
            <div class="level-desc">具备一定技术基础，开始追求战术意识和比赛能力的提升</div>
        </div>
        
        <div class="level-card" data-level="high">
            <div class="level-header">
                <span class="level-icon">🔥</span>
                <span class="level-badge">1800-2099</span>
            </div>
            <div class="level-title">逼近专业的准高手</div>
            <div class="level-desc">技术全面，战术意识强，在业余圈中属于顶尖水平</div>
        </div>
        
        <button class="btn" id="startBtn" disabled>开始测试</button>
        
        <div class="footer">
            <p>©️2026 业余乒乓球人的MBTI风格测试版权所有</p>
            <p>测试结果仅供参考</p>
        </div>
    </div>

    <div class="toast" id="toast">哈喽，先选个水平再开始呗～</div>

    <script>
        const cards = document.querySelectorAll('.level-card');
        const btn = document.getElementById('startBtn');
        const toast = document.getElementById('toast');
        let selectedLevel = '';

        async function generateUUID() {
            const existingUserId = localStorage.getItem('userId');
            if (existingUserId && existingUserId.length >= 32) {
                return existingUserId;
            }
            
            try {
                const response = await fetch('/.netlify/functions/get-user-id', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: existingUserId || '' })
                });
                const data = await response.json();
                if (data.code === 0 && data.userId) {
                    localStorage.setItem('userId', data.userId);
                    return data.userId;
                }
            } catch (error) {
                console.error('Failed to get userId from server:', error);
            }
            
            const fallbackId = crypto.randomUUID ? crypto.randomUUID().replace(/-/g, '') : 
                Array.from({length: 32}, () => Math.floor(Math.random() * 16).toString(16)).join('');
            localStorage.setItem('userId', fallbackId);
            return fallbackId;
        }

        // 页面加载时自动选中之前选择的水平
        document.addEventListener('DOMContentLoaded', async () => {
            const savedLevel = localStorage.getItem('userLevel');
            if (savedLevel) {
                const savedCard = document.querySelector(`.level-card[data-level="${savedLevel}"]`);
                if (savedCard) {
                    cards.forEach(c => c.classList.remove('selected'));
                    savedCard.classList.add('selected');
                    selectedLevel = savedLevel;
                    btn.disabled = false;
                }
            }
            await generateUUID();
        });

        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedLevel = card.dataset.level;
                btn.disabled = false;
            });
        });

        btn.addEventListener('click', () => {
            if (!selectedLevel) {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
                return;
            }
            localStorage.setItem('userLevel', selectedLevel);
            localStorage.removeItem('answers');
            localStorage.removeItem('integrityScore');
            localStorage.removeItem('mbtiType');
            localStorage.removeItem('dimensionScores');
            window.location.href = 'quiz.html';
        });
    </script>
</body>
</html>
