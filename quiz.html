<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乒乓球MBTI测试</title>
    <script src="/script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #fdf6e3 0%, #fff8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            padding-top: 40px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .progress-section {
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c41e3a 0%, #ff6b35 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(196, 30, 58, 0.3);
        }

        .progress-text {
            font-size: 14px;
            color: #666;
            text-align: center;
        }

        .question-section {
            margin-bottom: 25px;
        }

        .question-number {
            font-size: 14px;
            color: #ff6b35;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 21px;
            font-weight: bold;
            color: #333;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .options-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-card {
            display: flex;
            align-items: flex-start;
            padding: 18px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff;
        }

        .option-card:hover {
            border-color: #ff6b35;
            background: #fff5f0;
        }

        .option-card.selected {
            border-color: #c41e3a;
            background: #fff0f0;
            box-shadow: 0 0 15px rgba(196, 30, 58, 0.15);
        }

        .option-letter {
            width: 28px;
            height: 28px;
            border: 2px solid #ccc;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-right: 15px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .option-card.selected .option-letter {
            border-color: #c41e3a;
            background: #c41e3a;
            color: #fff;
        }

        .option-text {
            font-size: 17px;
            color: #333;
            line-height: 1.5;
            padding-top: 3px;
        }

        .next-btn {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #c41e3a 0%, #ff6b35 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(196, 30, 58, 0.4);
        }

        .next-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196, 30, 58, 0.5);
        }

        .next-btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(196, 30, 58, 0.3);
        }

        .next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 15px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-section">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">第 1/30 题</div>
        </div>

        <div class="question-section">
            <div class="question-number" id="questionNumber">Q1</div>
            <div class="question-text" id="questionText"></div>
        </div>

        <div class="options-section" id="optionsSection"></div>

        <button class="next-btn" id="nextBtn" disabled>
            <span id="btnText">下一题</span>
        </button>

        <div class="footer">
            <p>©️2026 业余乒乓球人的MBTI风格测试</p>
        </div>
    </div>

    <div class="toast" id="toast">请选择一个选项</div>

                options: [

                    { text: '稳扎稳打，等对手失误', score: { S: 1 }, tag: '稳健派' },
                    { text: '计算线路，预判对手回球', score: { T: 1 }, tag: '计算派' },
                    { text: '随意应对，打哪算哪', score: { P: 1 }, tag: '随性派' }
                ]
            },
            {
                id: 28,
                text: '【抢攻】机会球出现，你会？',
                options: [
                    { text: '毫不犹豫，一板打死', score: { E: 1 }, tag: '果断派' },
                    { text: '稳一稳，确保上台', score: { S: 1 }, tag: '稳妥派' },
                    { text: '观察对手站位再决定', score: { T: 1 }, tag: '观察派' },
                    { text: '看心情，想发力就发力', score: { F: 1 }, tag: '随心派' }
                ]
            },
            {
                id: 29,
                text: '【心态】领先时被追分，你会？',
                options: [
                    { text: '加快节奏，一鼓作气拿下', score: { E: 1 }, tag: '激进派' },
                    { text: '放慢节奏，稳扎稳打', score: { I: 1 }, tag: '保守派' },
                    { text: '分析对手弱点，针对性攻击', score: { T: 1 }, tag: '分析派' },
                    { text: '无所谓，输了就输了', score: { P: 1 }, tag: '佛系派' }
                ]
            },
            {
                id: 30,
                text: '【训练】你更喜欢哪种训练方式？',
                options: [
                    { text: '高强度对抗，实战为主', score: { E: 1 }, tag: '实战派' },
                    { text: '基本功打磨，循序渐进', score: { S: 1 }, tag: '基础派' },
                    { text: '技术研究，视频分析', score: { T: 1 }, tag: '研究派' },
                    { text: '快乐乒乓，轻松自在', score: { F: 1 }, tag: '快乐派' }
                ]
            }
        ];

        const currentQuestionIndex = 0;
        const shuffledQuestions = [];
        const userAnswers = [];
        let currentIndex = 0;
        let selectedOption = null;

        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const questionNumber = document.getElementById('questionNumber');
        const questionText = document.getElementById('questionText');
        const optionsSection = document.getElementById('optionsSection');
        const nextBtn = document.getElementById('nextBtn');
        const btnText = document.getElementById('btnText');
        const toast = document.getElementById('toast');

        function shuffleArray(array) {
            const result = [...array];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        function initQuiz() {
            shuffledQuestions.push(...shuffleArray(questions));
            shuffledQuestions.forEach(q => {
                q.options = shuffleArray(q.options);
            });
            loadQuestion();
        }

        function loadQuestion() {
            const question = shuffledQuestions[currentIndex];
            questionNumber.textContent = `Q${question.id}`;
            questionText.textContent = question.text;
            
            optionsSection.innerHTML = '';
            selectedOption = null;
            nextBtn.disabled = true;

            const letters = ['A', 'B', 'C', 'D'];
            question.options.forEach((option, index) => {
                const optionCard = document.createElement('div');
                optionCard.className = 'option-card';
                optionCard.dataset.optionIndex = index;
                
                optionCard.innerHTML = `
                    <div class="option-letter">${letters[index]}</div>
                    <div class="option-text">${option.text}</div>
                `;
                
                optionCard.addEventListener('click', () => {
                    document.querySelectorAll('.option-card').forEach(card => {
                        card.classList.remove('selected');
                    });
                    optionCard.classList.add('selected');
                    selectedOption = index;
                    nextBtn.disabled = false;
                });
                
                optionsSection.appendChild(optionCard);
            });

            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / shuffledQuestions.length) * 100;
            progressFill.style.width = `${progress}%`;
            progressText.textContent = `第 ${currentIndex + 1}/${shuffledQuestions.length} 题`;
        }

        function calculateMBTI() {
            const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            
            userAnswers.forEach((answer, idx) => {
                const question = shuffledQuestions[idx];
                const selectedOption = question.options[answer];
                if (selectedOption && selectedOption.score) {
                    Object.entries(selectedOption.score).forEach(([key, value]) => {
                        scores[key] += value;
                    });
                }
            });

            let mbti = '';
            mbti += scores.E >= scores.I ? 'E' : 'I';
            mbti += scores.S >= scores.N ? 'S' : 'N';
            mbti += scores.T >= scores.F ? 'T' : 'F';
            mbti += scores.J >= scores.P ? 'J' : 'P';

            return mbti;
        }

        function checkIntegrity() {
            let contradictionCount = 0;
            
            const q5Index = shuffledQuestions.findIndex(q => q.id === 5);
            const q25Index = shuffledQuestions.findIndex(q => q.id === 25);
            
            if (q5Index !== -1 && q25Index !== -1) {
                const q5Answer = shuffledQuestions[q5Index].options[userAnswers[q5Index]];
                const q25Answer = shuffledQuestions[q25Index].options[userAnswers[q25Index]];
                
                if (q5Answer.check === 'aggressive' && q25Answer.check === 'conservative') {
                    contradictionCount++;
                }
            }

            return contradictionCount < 3;
        }

        nextBtn.addEventListener('click', () => {
            if (selectedOption === null) {
                showToast('请选择一个选项');
                return;
            }

            const question = shuffledQuestions[currentIndex];
            userAnswers.push(selectedOption);

            if (currentIndex < shuffledQuestions.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                const mbtiType = calculateMBTI();
                const integrityScore = checkIntegrity();
                
                localStorage.setItem('answers', JSON.stringify(userAnswers));
                localStorage.setItem('mbtiType', mbtiType);
                localStorage.setItem('integrityScore', integrityScore.toString());
                
                window.location.href = '/result.html';
            }

            if (currentIndex === shuffledQuestions.length - 1) {
                btnText.textContent = '查看结果';
            }
        });

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        initQuiz();
    </script>
</body>
</html>
