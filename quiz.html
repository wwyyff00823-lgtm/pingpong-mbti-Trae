<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乒乓球MBTI测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            padding-top: 40px;
            background-color: #fff8f5;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 40px,
                    rgba(196, 30, 58, 0.03) 40px,
                    rgba(196, 30, 58, 0.03) 42px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 40px,
                    rgba(196, 30, 58, 0.03) 40px,
                    rgba(196, 30, 58, 0.03) 42px
                );
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(196, 30, 58, 0.12);
        }
        .progress-section {
            margin-bottom: 30px;
        }
        .progress-bar {
            height: 12px;
            background: #f0f0f0;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c41e3a 0%, #ff6b35 100%);
            border-radius: 6px;
            transition: width 0.4s ease;
            box-shadow: 0 0 15px rgba(196, 30, 58, 0.4);
        }
        .progress-text {
            font-size: 14px;
            color: #666;
            text-align: center;
            font-weight: 500;
        }
        .question-section {
            margin-bottom: 28px;
        }
        .question-number {
            font-size: 13px;
            color: #ff6b35;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .question-text {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .options-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }
        .option-card {
            display: flex;
            align-items: flex-start;
            padding: 20px;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.35s ease;
            background: #fff;
            position: relative;
            overflow: hidden;
        }
        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #c41e3a, #ff6b35);
            transform: scaleY(0);
            transition: transform 0.35s ease;
        }
        .option-card:hover {
            border-color: #ff6b35;
            background: #fff8f5;
            transform: translateX(4px);
        }
        .option-card:hover::before {
            transform: scaleY(1);
        }
        .option-card.selected {
            border-color: #c41e3a;
            background: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.18);
        }
        .option-card.selected::before {
            transform: scaleY(1);
        }
        .option-letter {
            width: 32px;
            height: 32px;
            border: 2px solid #ddd;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #666;
            margin-right: 14px;
            flex-shrink: 0;
            transition: all 0.35s ease;
        }
        .option-card.selected .option-letter {
            border-color: #c41e3a;
            background: linear-gradient(135deg, #c41e3a, #ff6b35);
            color: #fff;
            box-shadow: 0 0 10px rgba(196, 30, 58, 0.3);
        }
        .option-text {
            font-size: 16px;
            color: #333;
            line-height: 1.55;
            padding-top: 4px;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            flex: 1;
            height: 52px;
            background: linear-gradient(135deg, #c41e3a 0%, #ff6b35 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 4px 15px rgba(196, 30, 58, 0.4);
        }
        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(196, 30, 58, 0.5);
        }
        .nav-btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(196, 30, 58, 0.3);
        }
        .nav-btn:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
            box-shadow: none;
        }
        .nav-btn.secondary {
            background: #f5f5f5;
            color: #666;
            box-shadow: none;
        }
        .nav-btn.secondary:hover:not(:disabled) {
            background: #e8e8e8;
            box-shadow: none;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 28px;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 18px 36px;
            border-radius: 16px;
            font-size: 16px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

                    { id: 'q23_opt3', text: '退台对拉，跟着手感硬碰硬', score: { F: -1 } },
                    { id: 'q23_opt4', text: '放高球磨，耗到他没耐心', score: { F: -2 } }
                ]
            },
            {
                id: 'q24',
                text: '打完一场球输了，你走出球馆第一句话是？',
                dimension: 'EI',
                options: [
                    { id: 'q24_opt1', text: '正手位漏了，回去得练步伐', score: { E: 1 } },
                    { id: 'q24_opt2', text: '战术没打好，下次换个套路', score: { T: 1 } },
                    { id: 'q24_opt3', text: '今天没睡醒，状态太差了', score: { F: -1 } },
                    { id: 'q24_opt4', text: '算了就是玩，输赢不重要', score: { P: -2 } }
                ]
            },
            {
                id: 'q25',
                text: '赛点时刻你拿到发球权，第一想法是？',
                dimension: 'EI',
                options: [
                    { id: 'q25_opt1', text: '发球抢攻，直接结束比赛', score: { E: 2 } },
                    { id: 'q25_opt2', text: '主动创造机会，上手得分', score: { E: 1 } },
                    { id: 'q25_opt3', text: '发稳球，别送赛点', score: { I: -1 } },
                    { id: 'q25_opt4', text: '控制节奏，稳扎稳打', score: { I: -2 } }
                ]
            },
            {
                id: 'q26',
                text: '接发球时，你更信赖什么？',
                dimension: 'SN',
                options: [
                    { id: 'q26_opt1', text: '手指微调，精准控制弧线落点', score: { S: 2 } },
                    { id: 'q26_opt2', text: '动作标准，按固定框架接', score: { S: 1 } },
                    { id: 'q26_opt3', text: '重心交换，靠整体发力接', score: { N: -1 } },
                    { id: 'q26_opt4', text: '身体直觉，跟着感觉接就行', score: { N: -2 } }
                ]
            },
            {
                id: 'q27',
                text: '发现对手反手位很弱，你会怎么做？',
                dimension: 'TF',
                options: [
                    { id: 'q27_opt1', text: '持续压反手，逻辑上打死弱点', score: { T: 2 } },
                    { id: 'q27_opt2', text: '压两板反手突然变正手，打组合拳', score: { T: 1 } },
                    { id: 'q27_opt3', text: '偶尔偷袭，主要还是打相持', score: { F: -1 } },
                    { id: 'q27_opt4', text: '看心情打，想到啥就打啥', score: { F: -2 } }
                ]
            },
            {
                id: 'q28',
                text: '打丢了几个简单球，你脑子里在想？',
                dimension: 'JP',
                options: [
                    { id: 'q28_opt1', text: '刚才动作错了，下一球按标准调整', score: { J: 2 } },
                    { id: 'q28_opt2', text: '稳住，按既定节奏打下一个', score: { J: 1 } },
                    { id: 'q28_opt3', text: '哎呀怎么这么笨，手太生了', score: { P: -1 } },
                    { id: 'q28_opt4', text: '球台太滑光线暗，正常正常', score: { P: -2 } }
                ]
            },
            {
                id: 'q29',
                text: '关键分面对对手的搏杀发球，你选择？',
                dimension: 'EI',
                validityCheck: true,
                checkType: 'EI',
                options: [
                    { id: 'q29_opt1', text: '直接抢攻，跟他对搏', score: { E: 2 }, tendency: 'aggressive' },
                    { id: 'q29_opt2', text: '积极上手，争取主动', score: { E: 1 }, tendency: 'aggressive' },
                    { id: 'q29_opt3', text: '先稳一板过渡，不冒险', score: { I: -1 }, tendency: 'conservative' },
                    { id: 'q29_opt4', text: '稳健接发，打相持找机会', score: { I: -2 }, tendency: 'conservative' }
                ]
            },
            {
                id: 'q30',
                text: '赛前一天，你会做什么准备？',
                dimension: 'JP',
                validityCheck: true,
                checkType: 'JP',
                options: [
                    { id: 'q30_opt1', text: '制定详细战术方案，写在纸上', score: { J: 2 }, tendency: 'planned' },
                    { id: 'q30_opt2', text: '想象可能遇到的场景，在脑子里过一遍', score: { J: 1 }, tendency: 'planned' },
                    { id: 'q30_opt3', text: '放松心态，顺其自然', score: { P: -1 }, tendency: 'flexible' },
                    { id: 'q30_opt4', text: '该干嘛干嘛，比赛当天再看情况', score: { P: -2 }, tendency: 'flexible' }
                ]
            }
        ];

        let currentIndex = 0;
        let shuffledQuestions = [];
        let answers = {};
        let dimensionScores = { E: 0, S: 0, T: 0, J: 0 };

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initQuiz() {
            shuffledQuestions = questions.map(q => ({
                ...q,
                options: shuffleArray(q.options)
            }));
            shuffledQuestions = shuffleArray(shuffledQuestions);
            
            const savedAnswers = localStorage.getItem('answers');
            if (savedAnswers) {
                answers = JSON.parse(savedAnswers);
            }
            
            renderQuestion();
        }

        function renderQuestion() {
            const question = shuffledQuestions[currentIndex];
            const optionsSection = document.getElementById('optionsSection');
            const letters = ['A', 'B', 'C', 'D'];
            
            document.getElementById('questionNumber').textContent = `Q${currentIndex + 1}`;
            document.getElementById('questionText').textContent = question.text;
            
            optionsSection.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionCard = document.createElement('div');
                optionCard.className = `option-card ${answers[question.id] === option.id ? 'selected' : ''}`;
                optionCard.dataset.optionId = option.id;
                
                optionCard.innerHTML = `
                    <span class="option-letter">${letters[index]}</span>
                    <span class="option-text">${option.text}</span>
                `;
                
                optionCard.addEventListener('click', () => selectOption(option.id));
                optionsSection.appendChild(optionCard);
            });
            
            updateProgress();
            updateNavButtons();
        }

        function selectOption(optionId) {
            const question = shuffledQuestions[currentIndex];
            answers[question.id] = optionId;
            localStorage.setItem('answers', JSON.stringify(answers));
            
            const selectedOption = question.options.find(opt => opt.id === optionId);
            // 效检测试题不参与维度计分
            if (selectedOption && selectedOption.score && !question.validityCheck) {
                Object.keys(selectedOption.score).forEach(key => {
                    dimensionScores[key] += selectedOption.score[key];
                });
            }
            
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.querySelector(`[data-option-id="${optionId}"]`).classList.add('selected');
            
            updateNavButtons();
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / shuffledQuestions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = `第 ${currentIndex + 1}/${shuffledQuestions.length} 题`;
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const btnText = document.getElementById('btnText');
            
            prevBtn.disabled = currentIndex === 0;
            
            const hasAnswer = answers[shuffledQuestions[currentIndex].id];
            nextBtn.disabled = !hasAnswer;
            
            btnText.textContent = currentIndex === shuffledQuestions.length - 1 ? '查看结果' : '下一题';
        }

        function checkIntegrity() {
            let contradictionCount = 0;
            
            // 第一组（E/I 维度）：Q5、Q29，检测激进/保守倾向是否一致
            const q5Answer = shuffledQuestions.find(q => q.id === 'q5');
            const q29Answer = shuffledQuestions.find(q => q.id === 'q29');
            
            if (q5Answer && q29Answer) {
                const q5Selected = q5Answer.options.find(opt => opt.id === answers['q5']);
                const q29Selected = q29Answer.options.find(opt => opt.id === answers['q29']);
                
                if (q5Selected && q29Selected) {
                    // aggressive = E 倾向，conservative = I 倾向
                    // 如果两题倾向不一致（一个E一个I），则矛盾
                    const q5IsE = q5Selected.tendency === 'aggressive'; // E 倾向
                    const q29IsE = q29Selected.tendency === 'aggressive'; // E 倾向
                    
                    // 矛盾：Q5是E倾向但Q29是I倾向，或反过来
                    if ((q5IsE && !q29IsE) || (!q5IsE && q29IsE)) {
                        contradictionCount++;
                    }
                }
            }
            
            // 第二组（J/P 维度）：Q11、Q30，检测计划/灵活倾向是否一致
            const q11Answer = shuffledQuestions.find(q => q.id === 'q11');
            const q30Answer = shuffledQuestions.find(q => q.id === 'q30');
            
            if (q11Answer && q30Answer) {
                const q11Selected = q11Answer.options.find(opt => opt.id === answers['q11']);
                const q30Selected = q30Answer.options.find(opt => opt.id === answers['q30']);
                
                if (q11Selected && q30Selected) {
                    // planned = J 倾向，flexible = P 倾向
                    // 如果两题倾向不一致（一个J一个P），则矛盾
                    const q11IsJ = q11Selected.tendency === 'planned'; // J 倾向
                    const q30IsJ = q30Selected.tendency === 'planned'; // J 倾向
                    
                    // 矛盾：Q11是J倾向但Q30是P倾向，或反过来
                    if ((q11IsJ && !q30IsJ) || (!q11IsJ && q30IsJ)) {
                        contradictionCount++;
                    }
                }
            }
            
            return contradictionCount < 2;
        }

        function calculateMBTI() {
            const E = dimensionScores.E;
            const S = dimensionScores.S;
            const T = dimensionScores.T;
            const J = dimensionScores.J;
            
            const mbti = 
                (E > 0 ? 'E' : 'I') +
                (S > 0 ? 'S' : 'N') +
                (T > 0 ? 'T' : 'F') +
                (J > 0 ? 'J' : 'P');
            
            return mbti;
        }

        function goToNext() {
            if (!answers[shuffledQuestions[currentIndex].id]) {
                document.getElementById('toast').classList.add('show');
                setTimeout(() => document.getElementById('toast').classList.remove('show'), 2000);
                return;
            }
            
            if (currentIndex === shuffledQuestions.length - 1) {
                const integrityScore = checkIntegrity();
                const mbtiType = calculateMBTI();
                
                localStorage.setItem('integrityScore', integrityScore.toString());
                localStorage.setItem('mbtiType', mbtiType);
                localStorage.setItem('dimensionScores', JSON.stringify(dimensionScores));
                
                window.location.href = 'result.html';
            } else {
                currentIndex++;
                renderQuestion();
            }
        }

        function goToPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        document.getElementById('nextBtn').addEventListener('click', goToNext);
        document.getElementById('prevBtn').addEventListener('click', goToPrev);

        initQuiz();
    </script>
