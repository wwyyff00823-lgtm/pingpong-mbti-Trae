        });

            document.getElementById('paymentModal').classList.add('show');
            document.getElementById('qrCodeContainer').style.display = 'none';
            document.getElementById('paymentMethods').style.display = 'flex';
            document.getElementById('paymentBtn').style.display = 'block';
            document.getElementById('paymentLoading').classList.remove('show');
        });

        document.getElementById('paymentBtn').addEventListener('click', async function() {
            const loading = document.getElementById('paymentLoading');
            const methods = document.getElementById('paymentMethods');
            const btn = document.getElementById('paymentBtn');
            const qrContainer = document.getElementById('qrCodeContainer');
            
            loading.classList.add('show');
            methods.style.display = 'none';
            btn.style.display = 'none';

            const orderNo = 'PING' + Date.now() + Math.random().toString(36).substr(2, 8).toUpperCase();
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(orderNo)}`;
            
            loading.classList.remove('show');
            qrContainer.style.display = 'block';
            document.getElementById('qrCodeImg').src = qrUrl;
            document.getElementById('orderNoDisplay').textContent = orderNo;

            pollInterval = setInterval(async function() {
                const random = Math.random();
                if (random > 0.6) {
                    clearInterval(pollInterval);
                    document.getElementById('paymentModal').classList.remove('show');
                    showToast('支付成功！');
                    unlockReport();
                }
            }, 2000);
        });

        document.getElementById('paymentModal').addEventListener('click', function(e) {
            if (e.target === document.getElementById('paymentModal')) {
                document.getElementById('paymentModal').classList.remove('show');
                if (pollInterval) {
                    clearInterval(pollInterval);
                }
            }
        });

        document.getElementById('retestBtn').addEventListener('click', function() {
            localStorage.removeItem('answers');
            localStorage.removeItem('mbtiType');
            localStorage.removeItem('integrityScore');
