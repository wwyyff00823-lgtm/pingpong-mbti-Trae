        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: linear-gradient(135deg, #fdf6e3 0%, #fff8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            padding-top: 40px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .result-header { text-align: center; margin-bottom: 30px; }
        .mbti-type {
            font-size: 48px; font-weight: bold; color: #c41e3a;
            text-shadow: 2px 2px 4px rgba(196,30,58,0.2);
            margin-bottom: 15px; letter-spacing: 8px;
        }
        .personality-name { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .warning-box {
            background: #fff8dc; border: 2px solid #daa520;
            border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: center;
        }
        .warning-text { font-size: 14px; color: #8b4513; line-height: 1.5; }
        .personality-image {
            width: 200px; height: 200px; margin: 0 auto 25px;
            border-radius: 50%; background: linear-gradient(135deg, #fff0f0, #ffe0e0);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 30px rgba(196,30,58,0.2);
            position: relative;
            overflow: hidden;
        }
        .personality-image::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
            animation: shine 3s ease-in-out infinite;
        }
        @keyframes shine {
            0%, 100% { transform: translateX(-100%) rotate(45deg); }
            50% { transform: translateX(100%) rotate(45deg); }
        }
        .image-content { 
            font-size: 90px; 
            position: relative; 
            z-index: 1;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .image-label {
            position: absolute; bottom: -30px; left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #c41e3a, #ff6b35);
            color: #fff; padding: 6px 16px; border-radius: 20px;
            font-size: 12px; font-weight: bold;
            white-space: nowrap;
        }
        .traits-section { margin-bottom: 30px; }
        .trait-item {
            display: flex; padding: 15px 20px;
            background: #f8f9fa; border-radius: 10px; margin-bottom: 10px;
        }
        .trait-number {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #c41e3a, #ff6b35);
            color: #fff; border-radius: 50%; display: flex;
            justify-content: center; align-items: center;
            font-size: 14px; font-weight: bold; margin-right: 15px;
        }
        .trait-text { font-size: 16px; color: #333; line-height: 1.5; padding-top: 3px; }
        .unlock-section {
            background: linear-gradient(135deg, #fff5f5, #fff0f0);
            border-radius: 15px; padding: 25px; margin-bottom: 25px; text-align: center;
        }
        .unlock-title { font-size: 18px; font-weight: bold; color: #c41e3a; margin-bottom: 10px; }
        .unlock-desc { font-size: 14px; color: #666; margin-bottom: 20px; }
        .unlock-btn {
            width: 100%; height: 56px;
            background: linear-gradient(135deg, #c41e3a, #ff6b35);
            color: #fff; border: none; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(196,30,58,0.4);
        }
        .unlock-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(196,30,58,0.5); }
        .price-tag { font-size: 24px; }
        .report-section {
            display: none; background: #f8f9fa;
            border-radius: 15px; padding: 25px; margin-bottom: 25px;
        }
        .report-section.show { display: block; }
        .report-header { font-size: 18px; font-weight: bold; color: #c41e3a; margin-bottom: 20px; text-align: center; }
        .report-wow {
            background: linear-gradient(135deg, #fff5f5, #fff0f0);
            border-left: 4px solid #c41e3a; padding: 15px; margin-bottom: 20px;
            border-radius: 0 10px 10px 0;
        }
        .report-wow-text { font-size: 15px; color: #c41e3a; font-weight: bold; }
        .report-section h4 { font-size: 16px; color: #333; margin-bottom: 12px; margin-top: 20px; }
        .report-section p { font-size: 14px; color: #555; line-height: 1.8; margin-bottom: 12px; }
        .report-prescription { background: #e8f5e9; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .report-prescription h5 { font-size: 14px; color: #2e7d32; margin-bottom: 10px; }
        .report-prescription ul { list-style: none; padding-left: 0; }
        .report-prescription li { font-size: 13px; color: #388e3c; padding: 5px 0; border-bottom: 1px dashed #c8e6c9; }
        .report-prescription li:last-child { border-bottom: none; }
        .report-equipment { background: #e3f2fd; border-radius: 10px; padding: 15px; }
        .report-equipment h5 { font-size: 14px; color: #1976d2; margin-bottom: 10px; }
        .report-equipment p { font-size: 13px; color: #1565c0; }
        .retest-btn {
            width: 100%; height: 52px;
            background: #f0f0f0; color: #666;
            border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }
        .retest-btn:hover { background: #e8e8e8; }
        .footer { text-align: center; font-size: 12px; color: #999; margin-top: 25px; padding-top: 15px; border-top: 1px solid #f0f0f0; }
        .toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: #fff;

            z-index: 2000;

        .toast.show { opacity: 1; visibility: visible; }

            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;

        .payment-modal.show { display: flex; }
        .payment-content {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .payment-icon { font-size: 48px; margin-bottom: 20px; }
        .payment-title { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .payment-desc { font-size: 14px; color: #666; margin-bottom: 25px; }
        .payment-amount { font-size: 28px; font-weight: bold; color: #c41e3a; margin-bottom: 25px; }
        .payment-methods { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .payment-method {
            display: flex; align-items: center; padding: 18px;
            border: 2px solid #e0e0e0; border-radius: 12px;
            cursor: pointer; transition: all 0.3s;
        }
        .payment-method:hover { border-color: #ff6b35; }
        .payment-method.selected { border-color: #c41e3a; background: #fff5f5; }
        .payment-radio {
            width: 24px; height: 24px; border: 2px solid #ccc;
            border-radius: 50%; margin-right: 15px; position: relative;
        }
        .payment-method.selected .payment-radio {
            background: #c41e3a; border-color: #c41e3a;
        }
        .payment-radio::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%); width: 10px; height: 10px;
            background: #fff; border-radius: 50%; opacity: 0;
        }
        .payment-method.selected .payment-radio::after { opacity: 1; }
        .payment-icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; margin-right: 15px; }
        .payment-method-name { font-size: 16px; color: #333; }
        .qr-code-box {

            background: #fff; border: 1px solid #e0e0e0;
            border-radius: 12px; padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .qr-code-box img { width: 100%; height: 100%; object-fit: contain; }
        .qr-code-desc { font-size: 14px; color: #666; margin-bottom: 10px; }
        .order-no { font-size: 12px; color: #999; }
        .payment-btn {
            width: 100%; height: 52px;
            background: linear-gradient(135deg, #c41e3a, #ff6b35);
            color: #fff; border: none; border-radius: 12px;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }
        .payment-close {
            position: absolute; top: 20px; right: 20px;
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.1); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; cursor: pointer;
        }
        .payment-loading {
            display: none;
            margin-bottom: 20px;
        }
        .payment-loading.show { display: block; }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #c41e3a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: #666; }
    </style>
</head>

            document.getElementById('warningBox').style.display = 'block';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function unlockReport() {
            document.getElementById('unlockSection').style.display = 'none';
            document.getElementById('reportSection').classList.add('show');
            document.getElementById('reportWow').textContent = report.wow;
            document.getElementById('reportContent').innerHTML = `
                <h4>深度病理分析</h4>
                <p>${report.analysis}</p>
                <div class="report-prescription">
                    <h5>📅 4周涨球计划</h5>
                    <ul>
                        <li>${report.prescription[0]}</li>
                        <li>${report.prescription[1]}</li>
                        <li>${report.prescription[2]}</li>
                        <li>${report.prescription[3]}</li>
                    </ul>
                </div>
                <div class="report-equipment">
                    <h5>🎾 器材推荐</h5>
                    <p>${report.equipment}</p>
                </div>
            `;
            window.PING.markAsPaid(mbti);
        }

        const canSkipPay = window.PING.canSkipPayment(mbti);
        if (canSkipPay) {
            showToast('检测到您已解锁过此结果，直接查看完整报告');
            setTimeout(unlockReport, 1000);
        }

        let selectedPaymentMethod = 'wechat';
        
        document.querySelectorAll('.payment-method').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.payment-method').forEach(e => e.classList.remove('selected'));
                el.classList.add('selected');
                selectedPaymentMethod = el.dataset.method;
            });
        });

        document.getElementById('unlockBtn').addEventListener('click', async () => {
            try {
                document.getElementById('paymentModal').classList.add('show');
                document.getElementById('qrCodeContainer').style.display = 'none';
                document.getElementById('paymentMethods').style.display = 'flex';
                document.getElementById('paymentBtn').style.display = 'block';
                document.getElementById('paymentLoading').classList.remove('show');
            } catch (error) {
                console.error('解锁按钮点击错误:', error);
                showToast('操作失败，请重试');
            }
        });

        document.getElementById('paymentBtn').addEventListener('click', async () => {
            const loading = document.getElementById('paymentLoading');
            const methods = document.getElementById('paymentMethods');
            const btn = document.getElementById('paymentBtn');
            const qrContainer = document.getElementById('qrCodeContainer');
            
            loading.classList.add('show');
            methods.style.display = 'none';
            btn.style.display = 'none';

            try {
                const result = await window.PING.createOrder(9.9, level, mbti);
                
                if (result.success) {
                    loading.classList.remove('show');
                    qrContainer.style.display = 'block';
                    document.getElementById('qrCodeImg').src = result.qrCodeUrl;
                    document.getElementById('orderNoDisplay').textContent = result.orderNo;
                    
                    localStorage.setItem('currentOrderNo', result.orderNo);
                    
                    pollInterval = setInterval(async () => {
                        const checkResult = await window.PING.checkOrder(result.orderNo);
                        if (checkResult.success && checkResult.status === 'paid') {
                            clearInterval(pollInterval);
                            document.getElementById('paymentModal').classList.remove('show');
                            showToast('支付成功！');
                            unlockReport();
                        } else if (checkResult.success && checkResult.status === 'failed') {
                            clearInterval(pollInterval);
                            showToast('支付失败，请重试');
                            methods.style.display = 'flex';
                            btn.style.display = 'block';
                            qrContainer.style.display = 'none';
                        }
                    }, 3000);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                loading.classList.remove('show');
                methods.style.display = 'flex';
                btn.style.display = 'block';
                showToast('创建订单失败，请重试');
            }
        });

        document.getElementById('paymentModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('paymentModal')) {
                document.getElementById('paymentModal').classList.remove('show');
                if (pollInterval) {
                    clearInterval(pollInterval);
                }
            }
        });
