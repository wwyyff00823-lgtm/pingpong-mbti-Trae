    <script>
        var data = {};
        data['ESTP'] = { name: '暴力熊猫', emoji: '🐼', label: '暴力熊猫', traits: ['球风凶猛，一板过是家常便饭，对手常常被你轰得怀疑人生。', '发球套路深似海，各种逆向旋转让对手摸不着头脑。', '关键分敢打敢拼，越到赛点越兴奋，天生的大心脏选手。'], reports: { low: { wow: '【WOW】暴力不是蛮干，是建立在绝对实力上的艺术', analysis: '你是球场上的"暴力美学"创始人，一板过是你的人生信条，看见球就想一板抡死对手。你坚信"天下武功唯快不破"，发球从来都是"子弹上膛"，正手拉球恨不得把底板甩断。对手还没反应过来，球已经飞出去了——或者飞出台了。你的暴力来源于对技术的迷信，觉得只要力量够大、速度够快，就能解决一切问题。问题是，对手一退台防回来，你就蒙了："这人怎么不退？"然后继续暴力抡，继续失误，继续"下一局我一定能打死你"。另外你吃发球吃得厉害，各种旋转在你眼里只有两种："能一板过的"和"不能一板过的"，前者你就猛抡，后者你就搓一板等机会——结果机会没等到，对手已经一板抡死你了。', prescription: ['第一周：上台率训练，练习轻发力攻球，要求上台率达到80%以上，每天3组每组20球，第二周开始慢慢加力', '第二周：旋转识别训练，教练发不同旋转的球，要求正确判断旋转并回接，每天20分钟，直到能准确识别10种不同旋转', '第三周：落点训练，练习打斜线、直线、追身三个落点，每天3组每组15球，要求每个落点各连续进5个', '第四周：实战中每局必须有5板以上的控制球，不允许一味暴力进攻，输球后复盘哪些球不该暴力抡'], equipment: '推荐7层纯木底板，正手配狂飙3套胶，硬度39度，海绵厚度2.2mm。纯木底板能帮你吃住球，减少一板过的冲动。胶皮选39度软一点的，增加上台率。' }, mid: { wow: '【WOW】你的暴力美学已经初露锋芒！', analysis: '你是球场上的"暴力熊猫"，球风凶悍不解释，一板过是日常操作。你的正手拉球速度快、力量大、落点刁钻，常常把对手轰得找不着北。但你的问题是过于追求暴力，忽略了节奏和变化。对手一旦适应了你的暴力节奏，退台和你打相持，你就陷入了"越抡越急、越急越失误"的怪圈。另外你的发球虽然转，但变化不多，高手一适应就知道你要干什么，直接等着你暴冲然后反拉。你关键分敢打敢拼这是优点，但"敢打"不等于"蛮干"，你需要学会在关键时刻用脑子打球。', prescription: ['第一周：节奏训练，练习快慢结合的进攻节奏，每组10分钟，先慢后快，体会不同节奏的效果', '第二周：放松训练，对着镜子练习挥拍动作，注意肩颈放松，每天15分钟，直到能连续挥拍50次不耸肩', '第三周：多球训练，提高连续进攻能力，要求连续进攻5板以上，每天3组，逐步提高到连续10板', '第四周：实战对抗，重点练习在3-5板内结束战斗的能力，每局至少要有2次主动的节奏变化'], equipment: '推荐外置芳碳底板，正手配蓝省套胶，反手配蝴蝶Tenergy 05。外置芳碳底板出球速度快，适合你的暴力打法，蓝省套胶能吃住旋转，Tenergy 05反手好透板。' }, high: { wow: '【WOW】暴力与技术的完美结合！', analysis: '你已经是一位非常出色的暴力进攻型选手，正手暴冲已经具备专业水准，但你在顶级对抗中还存在几个问题：第一，发球变化可以更丰富，现在你的发球虽然转，但套路太明显，高手一吃就知道你要干什么；第二，接发球手段可以更凶，你现在接还是偏保守，应该多练练挑打和拧拉；第三，相持阶段的线路选择可以更聪明，你现在经常一条道走到黑，被对手算准了就被动。记住，暴力是优势，但暴力+变化才是绝杀。', prescription: ['第一周：发球创新，开发1-2个新的发球套路，比如正手位侧身用反手发球，或者逆向旋转发球，每天练习30分钟', '第二周：接发球多样化，练习挑打、摆短、劈长相结合，要求三种技术都能稳定运用，每天20分钟', '第三周：线路训练，练习非常规线路的进攻，比如正手位主动变反手，压左送右，每天3组每组15球', '第四周：战术模拟，针对不同对手制定专门战术，比如对付防守好的要多变线，对付进攻型要抢先上手'], equipment: '推荐超级张继科或蝴蝶VIS底板，正手配国狂套胶，反手配D09c。超级张继科底板刚性强，适合暴力抡，国狂套胶能吃住强烈旋转，D09c反手通透速度快。' } } };
        
        data['ESFP'] = { name: '快乐顽童', emoji: '🤪', label: '快乐顽童', traits: ['球场上的开心果，享受每一分每一秒。', '手感细腻，经常打出令人惊叹的神仙球。', '情绪起伏较大，状态好时无人能挡。'], reports: { low: { wow: '【WOW】快乐是最好的天赋！', analysis: '你是球场上的"快乐乒乓"代言人，打球对你来说就是图一乐，输赢什么的都不重要，重要的是开心。你的口号是"友谊第一，比赛第二"，哪怕被打11-0，你也能笑着说"这局我让着你"。你的手感其实不错，经常能打出神仙球，但问题是状态不稳定，时灵时不灵。对手要是夸你一句"这球真漂亮"，你能高兴一整局；要是对手嘀咕一句"运气球"，你能郁闷三局。你的比赛态度太放松，缺乏竞争意识，总觉得"不就是打个球嘛，至于吗"，结果技术提升缓慢。', prescription: ['第一周：基本功训练，正手攻球和反手推挡各30分钟/天，要求动作规范，不许乱抡', '第二周：发球练习，固定2-3种发球套路，每天练习20分钟，直到能稳定发出两种不同旋转', '第三周：步伐训练，练习并步、交叉步移动，每天15分钟，要求能流畅地左右移动', '第四周：多球训练，提高连续进攻能力，每天20分钟，要求能连续攻10板以上'], equipment: '推荐5层纯木底板，配软一些的套胶，如729-08ES。5层纯木底板手感清晰，好控制，能帮你更好地感受球的旋转和速度。套胶选软一点的，增加容错率。' }, mid: { wow: '【WOW】快乐中蕴含无限潜力！', analysis: '你已经是一位极具天赋的选手，手感出色，经常能打出神仙球。但你最大的问题是专注力不够，比赛中容易走神，常常在关键分的时候想"中午吃什么"。你的进攻意识需要加强，现在你防守多、进攻少，总等着对手失误而不是主动得分。另外你的情绪起伏太大，状态好的时候能赢比你厉害的，状态不好的时候谁都能输你。你需要学会控制情绪，保持稳定发挥。', prescription: ['第一周：专注力训练，练习盯球和预判，每天10分钟，要求眼睛始终盯着球', '第二周：进攻意识培养，多练习主动进攻，每天20分钟，要求每局至少有5次主动上手', '第三周：心理训练，模拟比赛压力情境，比如落后5分怎么追，每天15分钟', '第四周：战术学习，了解基本战术套路，比如怎么发球抢攻、怎么打相持'], equipment: '推荐斯蒂卡CLCR底板，正手配狂飙3，反手配天极3。CLCR底板是全能型底板，攻防兼备，狂飙3能吃住旋转，天极3速度快。' }, high: { wow: '【WOW】快乐竞技的典范！', analysis: '你已经是一位非常优秀的选手，手感、技术、心态都很出色，在同级中属于高手。但你在顶级比赛中还需要提升两点：第一，情绪控制，虽然你总体心态好，但关键分偶尔还是会紧张，影响发挥；第二，求胜欲，你现在"友谊第一"的心态在低级别比赛中是优势，但在高级别比赛中可能变成劣势，你需要学会在关键时刻"狠"一点。', prescription: ['第一周：情绪管理训练，学习冥想和深呼吸，每局比赛前做3次深呼吸，每天练习15分钟', '第二周：落后局面训练，模拟0-8落后的情况，要求必须追到8-8，每天练习3次', '第三周：心理暗示训练，建立自信心，赛前默念"我能行"，每天练习10分钟', '第四周：高强度对抗，适应顶级比赛节奏，找高水平对手每天打2小时'], equipment: '推荐蝴蝶张继科ALC，正手配蓝省，反手配Tenergy 64。张继科ALC底板全面均衡，蓝省套胶能吃住强烈旋转，Tenergy 64反手速度快。' } } };

            var orderNo = 'PING' + Date.now() + Math.random().toString(36).substr(2, 8).toUpperCase();
            currentOrderNo = orderNo;
            var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(orderNo);
            
            qrContainer.style.display = 'block';
            document.getElementById('qrCodeImg').src = qrUrl;
            document.getElementById('orderNoDisplay').textContent = orderNo;
            
            // 模拟支付成功（30%概率）
            pollInterval = setInterval(function() {
                var random = Math.random();
                if (random > 0.5) {
                    clearInterval(pollInterval);
                    document.getElementById('paymentModal').className = 'modal';
                    showToast('支付成功！');
                    unlockReport();
                }
            }, 2000);
        }
        
        document.getElementById('paymentModal').onclick = function(e) {
            if (e.target === document.getElementById('paymentModal')) {
                document.getElementById('paymentModal').className = 'modal';
                if (pollInterval) {
                    clearInterval(pollInterval);
                }
            }
        };
        
        document.getElementById('retestBtn').onclick = function() {
            localStorage.removeItem('answers');
            localStorage.removeItem('mbtiType');
            localStorage.removeItem('integrityScore');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
